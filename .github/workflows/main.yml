name: CI-CD Pipeline
on: 
    push: 
        branches: ["main"]
    workflow_dispatch: 
jobs: 
     build-and-deploy:
         runs-on: ubuntu-latest
         steps: 
             - name: checkout the file
               uses: actions/checkout@v3
             - name: Setup python
               uses: actions/setup-python@v4
               with: 
                   python-version: "3.10"
             - name: Install dependiences
               run: pip install -r requirements.txt
             - name: Run tests
               run: pytest
               env:
                   PYTHONPATH: .
             - name: Deploy to EC2
               uses: appleboy/ssh-action@v1.0.0
               with: 
                   host: ${{secrets.EC2_HOST}}
                   username: ${{secrets.EC2_USER}}
                   key: ${{secrets.EC2_SSH_KEY}}
                   script: |
                       cd /home/ubuntu
                       if [ ! -d "app" ]; then
                         git clone https://github.com/mdhinakar608/CI-CD-Deployment-to-Server-ec2-project app
                       fi
                       cd app
                       git pull
                       if [ ! -d "venv" ]; then
                         python3 -m venv venv
                       fi
                       source venv/bin/activate
                       pip3 install -r requirements.txt
                       fuser -k 5000/tcp || true
                       nohup python3 app.py > output.log 2>&1 &
